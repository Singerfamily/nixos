creation_rules:
  # Bootstrap secrets are needed by every managed host's sops-nix at activation
  # time, so every host's age key (derived from its SSH host key) is a recipient,
  # alongside both human admins for editing.
  - path_regex: modules/secrets/sops/bootstrap.yaml$
    key_groups:
      - age:
          - *eric
          - *clint
          - *event-horizon
          - *clint-pc
          - *nebula
