name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: nix flake check
        run: nix flake check --no-build --accept-flake-config
      - name: nix fmt --check
        run: nix fmt -- --ci

  build-event-horizon:
    runs-on: ubuntu-latest
    needs: flake-check
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build event-horizon toplevel
        run: nix build .#nixosConfigurations.event-horizon.config.system.build.toplevel --no-link --accept-flake-config
